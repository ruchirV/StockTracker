sonar.projectKey=ruchirvasavada_StockTracker
sonar.organization=ruchirvasavada

# Project info
sonar.projectName=StockTracker
sonar.projectVersion=1.0

# Sources
sonar.sources=apps/backend/src,apps/frontend/src,packages/types/src
sonar.tests=apps/backend/src,apps/frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.d.ts,**/migrations/**,**/prisma/migrations/**

# TypeScript
sonar.typescript.tsconfigPath=apps/backend/tsconfig.json

# Coverage (backend Jest)
sonar.javascript.lcov.reportPaths=apps/backend/coverage/lcov.info,apps/frontend/coverage/lcov.info
