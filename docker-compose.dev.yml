services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: stocktracker
      POSTGRES_USER: stocktracker
      POSTGRES_PASSWORD: localdev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stocktracker']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
