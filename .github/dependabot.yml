version: 2
updates:
  # Root workspace (covers all npm packages in the monorepo)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 10
    groups:
      # Batch all NestJS updates into one PR
      nestjs:
        patterns:
          - '@nestjs/*'
      # Batch all testing tooling
      testing:
        patterns:
          - jest
          - '@types/jest'
          - ts-jest
          - vitest
          - '@vitest/*'
          - '@testing-library/*'
          - playwright
          - '@playwright/*'
      # Batch all TypeScript / ESLint tooling
      typescript-eslint:
        patterns:
          - typescript
          - typescript-eslint
          - '@typescript-eslint/*'
          - eslint
          - eslint-*
          - prettier
    ignore:
      # Prisma major versions require manual migration review
      - dependency-name: '@prisma/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
