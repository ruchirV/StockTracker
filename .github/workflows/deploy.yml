name: Deploy

on:
  push:
    branches: [main]

# Cancel in-progress deploys if a newer push lands
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Railway (backend) and Vercel (frontend) deploy automatically on push via
  # their GitHub integrations. This job waits for both to stabilise, then
  # smoke-tests the live endpoints to confirm the deploy succeeded.
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    steps:
      # Railway Docker builds typically take 60-120 s; Vercel ~30-60 s.
      # Wait generously before hitting the health endpoint.
      - name: Wait for Railway deployment
        run: sleep 120

      - name: Backend health check
        run: |
          curl --fail \
               --retry 20 \
               --retry-delay 15 \
               --retry-connrefused \
               ${{ secrets.RAILWAY_API_URL }}/health

      - name: Frontend smoke test
        run: |
          curl --fail \
               --retry 10 \
               --retry-delay 10 \
               ${{ secrets.VERCEL_FRONTEND_URL }}
