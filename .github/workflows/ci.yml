name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Lint
        run: npx turbo run lint

      - name: Type check
        run: npx turbo run typecheck

  # ── Backend unit tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stocktracker
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: stocktracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://stocktracker:testpass@localhost:5432/stocktracker_test
      REDIS_URL: redis://localhost:6379
      BULLMQ_REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-not-real
      JWT_REFRESH_SECRET: ci-refresh-secret-not-real
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      LLM_PROVIDER: stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend

      - name: Run tests
        run: npm run test -w apps/backend -- --coverage --passWithNoTests

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage/lcov.info
          retention-days: 1

  # ── Frontend unit tests ──────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -w apps/frontend -- --passWithNoTests --coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/lcov.info
          retention-days: 1

  # ── Dependency audit ─────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # audit-ci wraps npm audit with proper allowlisting support.
        # Allowlisted advisories are in .audit-ci.json — all are unfixable
        # without breaking changes (lodash in @nestjs/config, picomatch in
        # @nestjs/cli devDep). Any new high/critical advisory will still fail.
        run: npx audit-ci@^7 --config .audit-ci.json

  # ── CodeQL SAST ──────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # ── SonarCloud analysis ──────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Only run on PRs and main branch pushes — not every feature branch push
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud needs full history for blame data

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: apps/frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
