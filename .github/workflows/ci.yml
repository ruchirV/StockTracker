name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Lint
        run: npx turbo run lint

      - name: Type check
        run: npx turbo run typecheck

  # ── Backend unit tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stocktracker
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: stocktracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://stocktracker:testpass@localhost:5432/stocktracker_test
      REDIS_URL: redis://localhost:6379
      BULLMQ_REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-not-real
      JWT_REFRESH_SECRET: ci-refresh-secret-not-real
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      LLM_PROVIDER: stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend

      - name: Run tests
        run: npm run test -w apps/backend -- --coverage --passWithNoTests

  # ── Frontend unit tests ──────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci


      - name: Run tests
        run: npm run test -w apps/frontend -- --passWithNoTests

  # ── Dependency audit ─────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: |
          npm audit --audit-level=high \
            --omit=dev \
            --ignore-advisories GHSA-r5fr-rjxr-66jc,GHSA-f23m-r3pf-42rh
        # --omit=dev: skips devDependencies (e.g. picomatch via @nestjs/cli)
        # --ignore-advisories: lodash in @nestjs/config — the only fix is a
        #   breaking downgrade to @nestjs/config@1.1.5; the vulnerable
        #   _.template function is not called by NestJS config

  # ── CodeQL SAST ──────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── SonarCloud analysis ──────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Only run on PRs and main branch pushes — not every feature branch push
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud needs full history for blame data

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
